<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe vs Ollama</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --text: #e4e4e7;
            --x: #f472b6;
            --o: #60a5fa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }
        .subtitle {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        .setup-panel {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        input, button {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        button {
            background: var(--primary);
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 0;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .cell {
            aspect-ratio: 1;
            background: var(--bg-card);
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .cell:hover:not(.taken) { border-color: var(--primary); }
        .cell.taken { cursor: default; }
        .cell.x { color: var(--x); }
        .cell.o { color: var(--o); }
        .status {
            text-align: center;
            padding: 1rem;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 1rem;
            min-height: 50px;
        }
        .thinking {
            color: var(--primary);
            font-style: italic;
        }
        .error {
            color: #ef4444;
        }
        .winner { background: rgba(99, 102, 241, 0.3); }
        .log {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 150px;
            overflow-y: auto;
        }
        .log div { margin: 0.2rem 0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>❌⭕ Tic-Tac-Toe</h1>
        <p class="subtitle">You (X) vs Ollama AI (O)</p>
        
        <div id="setup" class="setup-panel">
            <label>Ollama Model:</label>
            <input type="text" id="model" value="llama3.2:latest" placeholder="llama3.2:latest">
            
            <label>Ollama URL:</label>
            <input type="text" id="url" value="http://192.168.99.113:11434">
            
            <label>Timeout (seconds):</label>
            <input type="number" id="timeout" value="30" min="10" max="120">
            
            <button onclick="startGame()">Start Game</button>
        </div>
        
        <div id="game" class="hidden">
            <div id="status" class="status">Your turn (X)</div>
            
            <div class="board" id="board">
                <div class="cell" data-i="0"></div>
                <div class="cell" data-i="1"></div>
                <div class="cell" data-i="2"></div>
                <div class="cell" data-i="3"></div>
                <div class="cell" data-i="4"></div>
                <div class="cell" data-i="5"></div>
                <div class="cell" data-i="6"></div>
                <div class="cell" data-i="7"></div>
                <div class="cell" data-i="8"></div>
            </div>
            
            <button onclick="resetGame()">New Game</button>
            <div id="log" class="log" style="margin-top:1rem;"></div>
        </div>
    </div>

    <script>
        let board = ['','','','','','','','',''];
        let active = false;
        let thinking = false;
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        document.querySelectorAll('.cell').forEach(c => {
            c.onclick = () => humanMove(parseInt(c.dataset.i));
        });

        function startGame() {
            if (!document.getElementById('model').value.trim()) {
                alert('Enter Ollama model');
                return;
            }
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            resetGame();
        }

        function resetGame() {
            board = ['','','','','','','','',''];
            active = true;
            thinking = false;
            document.querySelectorAll('.cell').forEach(c => {
                c.textContent = '';
                c.className = 'cell';
            });
            document.getElementById('log').innerHTML = '';
            setStatus('Your turn (X)');
        }

        function humanMove(i) {
            if (!active || thinking || board[i]) return;
            makeMove(i, 'X');
            if (active) setTimeout(aiMove, 500);
        }

        async function aiMove() {
            if (!active) return;
            thinking = true;
            setStatus('AI thinking...', 'thinking');
            
            console.log('[AI] Starting move request');
            console.log('[AI] Board state:', board);
            console.log('[AI] Available:', board.map((c,i) => c?'':i).filter(i => i !== ''));
            
            try {
                const move = await getOllamaMove();
                makeMove(move, 'O');
            } catch (err) {
                console.error('[AI] Failed:', err);
                console.error('[AI] Error type:', err.name);
                console.error('[AI] Error message:', err.message);
                setStatus('AI failed: ' + err.message, 'error');
                log('AI error: ' + err.message);
            }
            thinking = false;
        }

        async function getOllamaMove() {
            const url = document.getElementById('url').value;
            const model = document.getElementById('model').value;
            const timeoutSec = parseInt(document.getElementById('timeout').value) || 30;
            
            console.log('[AI] Config:', { url, model, timeoutSec });
            
            const available = board.map((c,i) => c?'':i).filter(i => i !== '').join(',');
            const taken = board.map((c,i) => c?`${i}(${c})`:'').filter(s=>s).join(', ');
            
            const prompt = `You are O (noughts) in Tic-Tac-Toe. Board positions 0-8:
${formatBoard()}

TAKEN (DON'T PICK): ${taken || 'none'}
AVAILABLE (PICK ONE): ${available || 'none'}

You are O. Pick ONE number from AVAILABLE. Respond ONLY with the number.`;

            console.log('[AI] Sending prompt:', prompt);
            
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), timeoutSec * 1000);
            
            console.log('[AI] Fetching from:', `${url}/api/generate`);
            
            let res;
            try {
                res = await fetch(`${url}/api/generate`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({model, prompt, stream: false}),
                    signal: ctrl.signal
                });
            } catch (fetchErr) {
                clearTimeout(timer);
                console.error('[AI] Fetch failed:', fetchErr);
                if (fetchErr.name === 'AbortError') {
                    throw new Error(`Request timed out after ${timeoutSec}s`);
                } else if (fetchErr.message.includes('Failed to fetch')) {
                    throw new Error(`Cannot connect to Ollama at ${url}. Is it running?`);
                } else {
                    throw new Error(`Network error: ${fetchErr.message}`);
                }
            }
            
            clearTimeout(timer);
            console.log('[AI] Response status:', res.status, res.statusText);
            
            if (!res.ok) {
                const errText = await res.text().catch(() => 'unknown');
                console.error('[AI] HTTP error:', res.status, errText);
                throw new Error(`HTTP ${res.status}: ${errText}`);
            }
            
            let data;
            try {
                data = await res.json();
            } catch (jsonErr) {
                console.error('[AI] JSON parse error:', jsonErr);
                throw new Error('Invalid JSON response from Ollama');
            }
            
            console.log('[AI] Response:', data);
            
            if (data.error) {
                console.error('[AI] Ollama error:', data.error);
                throw new Error(`Ollama error: ${data.error}`);
            }
            
            const txt = (data.response || '').trim();
            console.log('[AI] Raw response text:', txt);
            
            const match = txt.match(/[0-8]/);
            
            if (!match) {
                console.error('[AI] No valid move found in:', txt);
                throw new Error(`No valid move (0-8) in response: "${txt.substring(0,50)}..."`);
            }
            
            const move = parseInt(match[0]);
            console.log('[AI] Parsed move:', move);
            
            if (board[move]) {
                console.error('[AI] Position already taken:', move, 'by', board[move]);
                throw new Error(`Position ${move} already taken by ${board[move]}`);
            }
            
            log(`AI chose ${move}`);
            return move;
        }

        function makeMove(i, player) {
            board[i] = player;
            const cell = document.querySelector(`.cell[data-i="${i}"]`);
            cell.textContent = player;
            cell.classList.add('taken', player.toLowerCase());
            log(`${player} plays ${i}`);
            
            if (checkWin(player)) {
                active = false;
                setStatus(`${player} wins!`);
                highlightWin(player);
            } else if (board.every(c=>c)) {
                active = false;
                setStatus("Draw!");
            } else {
                setStatus(player === 'X' ? "AI thinking..." : "Your turn (X)");
            }
        }

        function checkWin(p) {
            return wins.some(w => w.every(i=> board[i]===p));
        }

        function highlightWin(p) {
            wins.forEach(w => {
                if (w.every(i=> board[i]===p)) {
                    w.forEach(i=> document.querySelector(`.cell[data-i="${i}"]`).classList.add('winner'));
                }
            });
        }

        function formatBoard() {
            return [0,3,6].map(r=> 
                `${r}: ${board[r]||'_'} | ${r+1}: ${board[r+1]||'_'} | ${r+2}: ${board[r+2]||'_'}`
            ).join('\n');
        }

        function setStatus(msg, cls) {
            const s = document.getElementById('status');
            s.textContent = msg;
            s.className = 'status ' + (cls || '');
        }

        function log(msg) {
            const d = document.getElementById('log');
            d.innerHTML += `<div>${msg}</div>`;
            d.scrollTop = d.scrollHeight;
        }
    </script>
</body>
</html>
