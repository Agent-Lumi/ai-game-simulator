<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe vs Ollama</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script>
    // Register service worker with better error handling
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("sw.js")
                .then(reg => console.log("[SW] Registered:", reg.scope))
                .catch(err => console.error("[SW] Registration failed:", err));
        });
    }
    </script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f0f1a;
            --bg-card: #1a1a2e;
            --text: #e4e4e7;
            --x: #f472b6;
            --o: #60a5fa;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }
        .subtitle {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        .setup-panel {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        input, button {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        button {
            background: var(--primary);
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 0;
            transition: opacity 0.2s, transform 0.1s;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: #333;
            margin-top: 0.5rem;
        }
        .btn-danger {
            background: var(--danger);
            margin-top: 0.5rem;
        }
        .btn-success {
            background: var(--success);
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .cell {
            aspect-ratio: 1;
            background: var(--bg-card);
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .cell:hover:not(.taken) { 
            border-color: var(--primary); 
            background: rgba(99, 102, 241, 0.1);
        }
        .cell.taken { cursor: default; }
        .cell.x { color: var(--x); }
        .cell.o { color: var(--o); }
        .cell:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
        .status {
            text-align: center;
            padding: 1rem;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 1rem;
            min-height: 50px;
        }
        .thinking {
            color: var(--primary);
            font-style: italic;
        }
        .error {
            color: var(--danger);
        }
        .winner { background: rgba(99, 102, 241, 0.3); }
        .log {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 150px;
            overflow-y: auto;
        }
        .log div { margin: 0.2rem 0; }
        .hidden { display: none; }
        
        /* Stats Panel Styles */
        .stats-panel {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .stat-box {
            text-align: center;
            padding: 0.75rem;
            background: var(--bg);
            border-radius: 8px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.25rem;
        }
        .streak-box {
            text-align: center;
            padding: 0.75rem;
            background: var(--bg);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .streak-value {
            font-size: 1.25rem;
            font-weight: bold;
        }
        .streak-win { color: var(--success); }
        .streak-loss { color: var(--danger); }
        .streak-neutral { color: var(--warning); }
        
        /* History Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 1.25rem;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            width: auto;
            padding: 0;
            margin: 0;
        }
        .modal-body {
            padding: 1rem 1.5rem;
            overflow-y: auto;
            flex: 1;
        }
        .history-item {
            background: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .history-item:hover {
            background: #252540;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .history-result {
            font-weight: bold;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .result-win { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .result-loss { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .result-draw { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .history-date {
            font-size: 0.8rem;
            opacity: 0.6;
        }
        .history-moves {
            font-size: 0.85rem;
            opacity: 0.8;
            font-family: monospace;
        }
        .history-detail {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid #333;
            font-size: 0.8rem;
            display: none;
        }
        .history-detail.expanded {
            display: block;
        }
        .move-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .move-item {
            background: var(--bg-card);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            opacity: 0.6;
        }
        .button-row {
            display: flex;
            gap: 0.5rem;
        }
        .button-row button {
            flex: 1;
        }
        
        /* Keyboard shortcuts hint */
        .shortcuts-hint {
            background: var(--bg);
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .shortcuts-hint kbd {
            background: var(--bg-card);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid #444;
        }
        
        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            color: var(--text);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 2000;
            transition: transform 0.3s ease;
            border: 1px solid var(--primary);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* Mobile responsive */
        @media (max-width: 480px) {
            body { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .cell { font-size: 2rem; }
            .shortcuts-hint { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❌⭕ Tic-Tac-Toe</h1>
        <p class="subtitle">You (X) vs Ollama AI (O)</p>
        
        <!-- Stats Panel -->
        <div id="statsPanel" class="stats-panel">
            <h3 style="margin-bottom: 1rem; text-align: center;">📊 Your Stats</h3>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="statPlayed">0</div>
                    <div class="stat-label">Played</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statWins">0</div>
                    <div class="stat-label">Wins</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="statWinRate">0%</div>
                    <div class="stat-label">Win Rate</div>
                </div>
            </div>
            <div class="streak-box">
                <div class="stat-label">Current Streak</div>
                <div class="streak-value" id="statStreak">-</div>
            </div>
            <div style="margin: 1rem 0; padding: 0.75rem; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: 0.9rem;">🔊 Sound Effects</span>
                <button id="soundToggle" onclick="toggleSound()" style="width: auto; padding: 0.4rem 0.8rem; font-size: 0.8rem; margin: 0;">ON</button>
            </div>
            <script>
                // Initialize sound toggle button state
                document.addEventListener('DOMContentLoaded', () => {
                    const btn = document.getElementById('soundToggle');
                    if (btn) btn.textContent = AudioFX.enabled ? '🔊 ON' : '🔇 OFF';
                });
                function toggleSound() {
                    const enabled = AudioFX.toggle();
                    document.getElementById('soundToggle').textContent = enabled ? '🔊 ON' : '🔇 OFF';
                    showToast(enabled ? 'Sound effects enabled 🔊' : 'Sound effects muted 🔇');
                }
            </script>
            <div class="button-row">
                <button onclick="showHistory()" class="btn-secondary">📜 View History</button>
                <button onclick="resetStats()" class="btn-danger">🗑️ Reset</button>
            </div>
        </div>
        
        <div id="setup" class="setup-panel">
            <label>Ollama Model:</label>
            <input type="text" id="model" value="llama3.2:latest" placeholder="llama3.2:latest">
            
            <label>Ollama URL:</label>
            <input type="text" id="url" value="http://192.168.99.113:11434">
            
            <label>Timeout (seconds):</label>
            <input type="number" id="timeout" value="30" min="10" max="120">
            
            <button onclick="startGame()">Start Game</button>
        </div>
        
        <div id="game" class="hidden">
            <div id="status" class="status">Your turn (X)</div>
            
            <div class="board" id="board">
                <div class="cell" data-i="0" tabindex="0" aria-label="Position 1, available"></div>
                <div class="cell" data-i="1" tabindex="0" aria-label="Position 2, available"></div>
                <div class="cell" data-i="2" tabindex="0" aria-label="Position 3, available"></div>
                <div class="cell" data-i="3" tabindex="0" aria-label="Position 4, available"></div>
                <div class="cell" data-i="4" tabindex="0" aria-label="Position 5, available"></div>
                <div class="cell" data-i="5" tabindex="0" aria-label="Position 6, available"></div>
                <div class="cell" data-i="6" tabindex="0" aria-label="Position 7, available"></div>
                <div class="cell" data-i="7" tabindex="0" aria-label="Position 8, available"></div>
                <div class="cell" data-i="8" tabindex="0" aria-label="Position 9, available"></div>
            </div>
            
            <button onclick="resetGame()">New Game (N)</button>
            
            <!-- Keyboard Shortcuts Hint -->
            <div class="shortcuts-hint">
                <strong>⌨️ Keyboard Shortcuts:</strong><br>
                <kbd>1</kbd>-<kbd>9</kbd> = Make move • <kbd>N</kbd> = New game • <kbd>H</kbd> = History • <kbd>Esc</kbd> = Close modal
            </div>
            
            <div id="log" class="log" style="margin-top:1rem;"></div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎮 Game History</h2>
                <button class="modal-close" onclick="closeHistory()">&times;</button>
            </div>
            <div class="modal-body" id="historyList">
                <!-- History items will be inserted here -->
            </div>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div id="toast" class="toast"></div>
    
    <!-- Sound Effects (Audio Context) -->
    <script>
    // Sound Effects Feature - Added by auto-builder
    const AudioFX = {
        ctx: null,
        enabled: true,
        
        init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return this.ctx !== null;
        },
        
        playTone(freq, duration, type = 'sine', volume = 0.3) {
            if (!this.enabled || !this.init()) return;
            
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.ctx.createGain();
            
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(volume, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            
            osc.start(this.ctx.currentTime);
            osc.stop(this.ctx.currentTime + duration);
        },
        
        playMove() {
            // Subtle click sound
            this.playTone(800, 0.1, 'sine', 0.15);
        },
        
        playWin() {
            // Victory fanfare (ascending)
            this.playTone(440, 0.15, 'square', 0.2);
            setTimeout(() => this.playTone(554, 0.15, 'square', 0.2), 150);
            setTimeout(() => this.playTone(659, 0.3, 'square', 0.25), 300);
        },
        
        playLose() {
            // Defeat sound (descending)
            this.playTone(330, 0.2, 'sawtooth', 0.2);
            setTimeout(() => this.playTone(277, 0.2, 'sawtooth', 0.2), 200);
            setTimeout(() => this.playTone(220, 0.4, 'sawtooth', 0.25), 400);
        },
        
        playDraw() {
            // Neutral draw sound
            this.playTone(440, 0.3, 'sine', 0.2);
        },
        
        playError() {
            // Error buzz
            this.playTone(150, 0.3, 'sawtooth', 0.3);
        },
        
        playClick() {
            // UI click
            this.playTone(1200, 0.05, 'sine', 0.1);
        },
        
        toggle() {
            this.enabled = !this.enabled;
            localStorage.setItem('ttt-sound-enabled', this.enabled);
            return this.enabled;
        },
        
        loadPreference() {
            const saved = localStorage.getItem('ttt-sound-enabled');
            if (saved !== null) {
                this.enabled = saved === 'true';
            }
        }
    };
    
    // Load sound preference on startup
    AudioFX.loadPreference();
    
    // Initialize audio context on first user interaction
    function initAudio() {
        AudioFX.init();
    }
    document.addEventListener('click', initAudio, { once: true });
    document.addEventListener('keydown', initAudio, { once: true });
    </script>

    <script>
        // Game State
        let board = ['','','','','','','','',''];
        let active = false;
        let thinking = false;
        let currentGameMoves = [];
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

        // Stats State
        const STATS_KEY = 'tictactoe_stats';
        const HISTORY_KEY = 'tictactoe_history';

        // Initialize
        document.querySelectorAll('.cell').forEach(c => {
            c.onclick = () => humanMove(parseInt(c.dataset.i));
            c.onkeydown = (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    humanMove(parseInt(c.dataset.i));
                }
            };
        });

        // Load stats on page load
        loadStats();
        
        // Setup keyboard shortcuts
        setupKeyboardShortcuts();

        // Keyboard Shortcuts Feature
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                // Don't trigger shortcuts when typing in inputs
                if (e.target.tagName === 'INPUT') return;
                
                // Check if history modal is open
                const historyOpen = !document.getElementById('historyModal').classList.contains('hidden');
                
                // Close modal on Escape
                if (e.key === 'Escape' && historyOpen) {
                    e.preventDefault();
                    closeHistory();
                    return;
                }
                
                // If modal is open, don't process game shortcuts
                if (historyOpen) return;
                
                // Game is active shortcuts
                if (active && !thinking) {
                    // Number keys 1-9 for positions
                    if (e.key >= '1' && e.key <= '9') {
                        e.preventDefault();
                        const pos = parseInt(e.key) - 1;
                        if (!board[pos]) {
                            humanMove(pos);
                            showToast(`Played at position ${e.key}`);
                        } else {
                            showToast('Position already taken!', 'error');
                        }
                    }
                }
                
                // Global shortcuts
                switch(e.key.toLowerCase()) {
                    case 'n':
                        e.preventDefault();
                        if (document.getElementById('game').classList.contains('hidden')) {
                            startGame();
                        } else {
                            resetGame();
                        }
                        showToast('New game started!');
                        break;
                    case 'h':
                        e.preventDefault();
                        showHistory();
                        break;
                }
            });
        }
        
        // Toast notification function
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.borderColor = type === 'error' ? 'var(--danger)' : 'var(--primary)';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // Update cell accessibility
        function updateCellAccessibility() {
            document.querySelectorAll('.cell').forEach((cell, i) => {
                const player = board[i];
                const taken = player !== '';
                cell.setAttribute('aria-label', taken ? 
                    `Position ${i + 1}, taken by ${player}` : 
                    `Position ${i + 1}, available. Press ${i + 1} to play.`
                );
            });
        }

        // Stats Functions
        function loadStats() {
            const stats = JSON.parse(localStorage.getItem(STATS_KEY) || '{"played":0,"wins":0,"losses":0,"draws":0,"streak":0,"lastResult":null}');
            updateStatsDisplay(stats);
        }

        function updateStatsDisplay(stats) {
            document.getElementById('statPlayed').textContent = stats.played;
            document.getElementById('statWins').textContent = stats.wins;
            
            const winRate = stats.played > 0 ? Math.round((stats.wins / stats.played) * 100) : 0;
            document.getElementById('statWinRate').textContent = winRate + '%';
            
            const streakEl = document.getElementById('statStreak');
            if (stats.streak > 0) {
                streakEl.textContent = `🔥 ${stats.streak} Win${stats.streak > 1 ? 's' : ''}`;
                streakEl.className = 'streak-value streak-win';
            } else if (stats.streak < 0) {
                streakEl.textContent = `❄️ ${Math.abs(stats.streak)} Loss${Math.abs(stats.streak) > 1 ? 'es' : ''}`;
                streakEl.className = 'streak-value streak-loss';
            } else {
                streakEl.textContent = '-';
                streakEl.className = 'streak-value streak-neutral';
            }
        }

        function recordGame(result, moves) {
            // Update stats
            const stats = JSON.parse(localStorage.getItem(STATS_KEY) || '{"played":0,"wins":0,"losses":0,"draws":0,"streak":0,"lastResult":null}');
            
            stats.played++;
            if (result === 'win') {
                stats.wins++;
                stats.streak = stats.lastResult === 'win' ? stats.streak + 1 : 1;
            } else if (result === 'loss') {
                stats.losses++;
                stats.streak = stats.lastResult === 'loss' ? stats.streak - 1 : -1;
            } else {
                stats.draws++;
                stats.streak = 0;
            }
            stats.lastResult = result;
            
            localStorage.setItem(STATS_KEY, JSON.stringify(stats));
            updateStatsDisplay(stats);
            
            // Add to history
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const gameRecord = {
                id: Date.now(),
                date: new Date().toISOString(),
                result: result,
                moves: moves,
                movesCount: moves.length
            };
            history.unshift(gameRecord);
            // Keep only last 50 games
            if (history.length > 50) history.pop();
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function resetStats() {
            if (confirm('Are you sure you want to reset all stats and history? This cannot be undone.')) {
                localStorage.removeItem(STATS_KEY);
                localStorage.removeItem(HISTORY_KEY);
                loadStats();
                log('Stats and history reset');
                showToast('Stats reset!');
            }
        }

        // History Modal Functions
        function showHistory() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
            const listEl = document.getElementById('historyList');
            
            if (history.length === 0) {
                listEl.innerHTML = '<div class="empty-state">No games played yet!<br>Start playing to build your history.</div>';
            } else {
                listEl.innerHTML = history.map(game => {
                    const date = new Date(game.date);
                    const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const resultClass = game.result === 'win' ? 'result-win' : game.result === 'loss' ? 'result-loss' : 'result-draw';
                    const resultText = game.result === 'win' ? 'WIN' : game.result === 'loss' ? 'LOSS' : 'DRAW';
                    
                    // Format moves
                    const movesSummary = game.moves.map((m, i) => `${i+1}. ${m.player}${m.pos}`).join(', ');
                    const movesDetail = game.moves.map((m, i) => 
                        `<span class="move-item">${i+1}. ${m.player}→${m.pos}</span>`
                    ).join('');
                    
                    return `
                        <div class="history-item" onclick="toggleHistoryDetail(${game.id})">
                            <div class="history-header">
                                <span class="history-result ${resultClass}">${resultText}</span>
                                <span class="history-date">${dateStr}</span>
                            </div>
                            <div class="history-moves">${movesSummary}</div>
                            <div class="history-detail" id="detail-${game.id}">
                                <div style="margin-top: 0.5rem; opacity: 0.8;">Move sequence:</div>
                                <div class="move-list">${movesDetail}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            document.getElementById('historyModal').classList.remove('hidden');
        }

        function closeHistory() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        function toggleHistoryDetail(gameId) {
            const detail = document.getElementById(`detail-${gameId}`);
            if (detail) {
                detail.classList.toggle('expanded');
            }
        }

        // Close modal on overlay click
        document.getElementById('historyModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('historyModal')) {
                closeHistory();
            }
        });

        // Game Functions
        function startGame() {
            if (!document.getElementById('model').value.trim()) {
                alert('Enter Ollama model');
                return;
            }
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            resetGame();
        }

        function resetGame() {
            board = ['','','','','','','','',''];
            active = true;
            thinking = false;
            currentGameMoves = [];
            document.querySelectorAll('.cell').forEach(c => {
                c.textContent = '';
                c.className = 'cell';
                c.setAttribute('tabindex', '0');
            });
            document.getElementById('log').innerHTML = '';
            setStatus('Your turn (X) - Press 1-9 to play');
            updateCellAccessibility();
        }

        function humanMove(i) {
            if (!active || thinking || board[i]) {
                // Play error sound if cell is taken or game not active
                if (board[i]) AudioFX.playError();
                return;
            }
            makeMove(i, 'X');
            if (active) setTimeout(aiMove, 500);
        }

        async function aiMove() {
            if (!active) return;
            thinking = true;
            setStatus('AI thinking...', 'thinking');
            
            console.log('[AI] Starting move request');
            console.log('[AI] Board state:', board);
            console.log('[AI] Available:', board.map((c,i) => c?'':i).filter(i => i !== ''));
            
            try {
                const move = await getOllamaMove();
                makeMove(move, 'O');
            } catch (err) {
                console.error('[AI] Failed:', err);
                console.error('[AI] Error type:', err.name);
                console.error('[AI] Error message:', err.message);
                
                let userMsg = err.message;
                if (err.message.includes('Cannot connect')) {
                    userMsg = '❌ Cannot connect to Ollama. Check URL.';
                } else if (err.message.includes('timed out')) {
                    userMsg = '⏱️ Request timed out. Increase timeout or check Ollama.';
                } else if (err.message.includes('No valid move')) {
                    userMsg = '🤔 AI gave invalid response. Try again.';
                } else if (err.message.includes('already taken')) {
                    userMsg = '⚠️ AI tried taken spot. Board changed?';
                } else if (err.message.includes('Failed to fetch')) {
                    userMsg = '❌ Network error. Is Ollama running?';
                }
                
                setStatus('AI failed: ' + err.message, 'error');
                log(userMsg);
                log('Details: ' + err.message);
                showToast(userMsg, 'error');
            }
            thinking = false;
        }

        async function getOllamaMove() {
            const url = document.getElementById('url').value;
            const model = document.getElementById('model').value;
            const timeoutSec = parseInt(document.getElementById('timeout').value) || 30;
            
            console.log('[AI] Config:', { url, model, timeoutSec });
            
            const available = board.map((c,i) => c?'':i).filter(i => i !== '').join(',');
            const taken = board.map((c,i) => c?`${i}(${c})`:'').filter(s=>s).join(', ');
            
            const prompt = `You are O (noughts) in Tic-Tac-Toe. Board positions 0-8:
${formatBoard()}

TAKEN (DON'T PICK): ${taken || 'none'}
AVAILABLE (PICK ONE): ${available || 'none'}

You are O. Pick ONE number from AVAILABLE. Respond ONLY with the number.`;

            console.log('[AI] Sending prompt:', prompt);
            
            const ctrl = new AbortController();
            const timer = setTimeout(() => ctrl.abort(), timeoutSec * 1000);
            
            console.log('[AI] Fetching from:', `${url}/api/generate`);
            
            let res;
            try {
                res = await fetch(`${url}/api/generate`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({model, prompt, stream: false}),
                    signal: ctrl.signal
                });
            } catch (fetchErr) {
                clearTimeout(timer);
                console.error('[AI] Fetch failed:', fetchErr);
                if (fetchErr.name === 'AbortError') {
                    throw new Error(`Request timed out after ${timeoutSec}s`);
                } else if (fetchErr.message.includes('Failed to fetch')) {
                    throw new Error(`Cannot connect to Ollama at ${url}. Is it running?`);
                } else {
                    throw new Error(`Network error: ${fetchErr.message}`);
                }
            }
            
            clearTimeout(timer);
            console.log('[AI] Response status:', res.status, res.statusText);
            
            if (!res.ok) {
                const errText = await res.text().catch(() => 'unknown');
                console.error('[AI] HTTP error:', res.status, errText);
                throw new Error(`HTTP ${res.status}: ${errText}`);
            }
            
            let data;
            try {
                data = await res.json();
            } catch (jsonErr) {
                console.error('[AI] JSON parse error:', jsonErr);
                throw new Error('Invalid JSON response from Ollama');
            }
            
            console.log('[AI] Response:', data);
            
            if (data.error) {
                console.error('[AI] Ollama error:', data.error);
                throw new Error(`Ollama error: ${data.error}`);
            }
            
            const txt = (data.response || '').trim();
            console.log('[AI] Raw response text:', txt);
            
            const match = txt.match(/[0-8]/);
            
            if (!match) {
                console.error('[AI] No valid move found in:', txt);
                throw new Error(`No valid move (0-8) in response: "${txt.substring(0,50)}..."`);
            }
            
            const move = parseInt(match[0]);
            console.log('[AI] Parsed move:', move);
            
            if (board[move]) {
                console.error('[AI] Position already taken:', move, 'by', board[move]);
                throw new Error(`Position ${move} already taken by ${board[move]}`);
            }
            
            log(`AI chose ${move}`);
            return move;
        }

        function makeMove(i, player) {
            board[i] = player;
            const cell = document.querySelector(`.cell[data-i="${i}"]`);
            cell.textContent = player;
            cell.classList.add('taken', player.toLowerCase());
            cell.removeAttribute('tabindex');
            log(`${player} plays ${i}`);
            
            // Play move sound
            AudioFX.playMove();
            
            // Record move
            currentGameMoves.push({ player: player, pos: i });
            
            // Update accessibility
            updateCellAccessibility();
            
            if (checkWin(player)) {
                active = false;
                setStatus(`${player} wins!`);
                highlightWin(player);
                showToast(`${player === 'X' ? 'You win! 🎉' : 'AI wins! 🤖'}`, player === 'X' ? 'success' : 'info');
                
                // Play win/lose sound
                if (player === 'X') {
                    AudioFX.playWin();
                } else {
                    AudioFX.playLose();
                }
                
                // Record game result
                const result = player === 'X' ? 'win' : 'loss';
                recordGame(result, currentGameMoves);
            } else if (board.every(c=>c)) {
                active = false;
                setStatus("Draw!");
                showToast('Draw game! 🤝');
                
                // Play draw sound
                AudioFX.playDraw();
                
                // Record draw
                recordGame('draw', currentGameMoves);
            } else {
                setStatus(player === 'X' ? "AI thinking..." : "Your turn (X) - Press 1-9 to play");
            }
        }

        function checkWin(p) {
            return wins.some(w => w.every(i=> board[i]===p));
        }

        function highlightWin(p) {
            wins.forEach(w => {
                if (w.every(i=> board[i]===p)) {
                    w.forEach(i=> document.querySelector(`.cell[data-i="${i}"]`).classList.add('winner'));
                }
            });
        }

        function formatBoard() {
            return [0,3,6].map(r=> 
                `${r}: ${board[r]||'_'} | ${r+1}: ${board[r+1]||'_'} | ${r+2}: ${board[r+2]||'_'}`
            ).join('\n');
        }

        function setStatus(msg, cls) {
            const s = document.getElementById('status');
            s.textContent = msg;
            s.className = 'status ' + (cls || '');
        }

        function log(msg) {
            const d = document.getElementById('log');
            d.innerHTML += `<div>${msg}</div>`;
            d.scrollTop = d.scrollHeight;
        }

        // Share functionality - Added by auto-builder
        const shareBtn = document.createElement('button');
        shareBtn.textContent = '🔗 Share Result';
        shareBtn.className = 'btn-secondary';
        shareBtn.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:12px 24px;background:#6366f1;color:white;border:none;border-radius:25px;cursor:pointer;z-index:1000;font-weight:600;box-shadow:0 4px 12px rgba(99,102,241,0.4);';
        shareBtn.onclick = async () => {
            // Play click sound
            AudioFX.playClick();
            
            const stats = JSON.parse(localStorage.getItem('ttt-stats') || '{"wins":0,"losses":0,"draws":0,"total":0}');
            const shareText = `🎮 Tic-Tac-Toe vs AI\n🏆 Wins: ${stats.wins} | 🤖 Losses: ${stats.losses} | 🤝 Draws: ${stats.draws}\n📊 Total Games: ${stats.total}\n\nPlay against Ollama AI!`;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Tic-Tac-Toe vs Ollama AI',
                        text: shareText,
                        url: location.href
                    });
                    showToast('Shared successfully! 🎉', 'success');
                } catch (err) {
                    console.log('Share cancelled');
                }
            } else {
                navigator.clipboard.writeText(shareText + '\n\n' + location.href);
                shareBtn.textContent = '✅ Copied!';
                showToast('Stats copied to clipboard! 📋', 'success');
                setTimeout(() => shareBtn.textContent = '🔗 Share Result', 2000);
            }
        };
        document.body.appendChild(shareBtn);
    </script>
</body>
</html>
<script>
// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
}
function notify(title, body) {
    if (Notification.permission === 'granted') {
        new Notification(title, { body });
    }
}
</script>
<script>
// Export functionality
function exportData(format) {
    const data = document.querySelector('textarea, input')?.value || document.body.innerText;
    const blob = new Blob([data], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'export.' + format;
    a.click();
    URL.revokeObjectURL(url);
}
</script>
